name: Flutter Build

on:
  push:
    branches:
      - master  # 或者您想监听的其他分支
  pull_request:
    branches:
      - master  # 或者您想监听的其他分支

jobs:
  build:
    runs-on: ubuntu-latest  # 使用 Ubuntu 最新的虚拟机

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up JDK 8
      uses: actions/setup-java@v2
      with:
        java-version: '8'  # 使用 Java 8

    - name: Set up Flutter 1.22.x
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '1.22.6'  # 使用 Flutter 1.22.6，这个版本发布于2018年，并兼容当时的 Android 嵌入 v1

    - name: Install dependencies
      run: flutter pub get  # 安装 Flutter 项目的依赖

    - name: Build APK
      run: flutter build apk --release  # 生成 release 版本的 APK

    - name: Upload APK artifact
      uses: @github/actions/upload-artifact@v3  # 使用新的上传工件版本
      with:
        name: flutter-apk
        path: build/app/outputs/flutter-apk/app-release.apk  # 上传生成的 APK 文件
